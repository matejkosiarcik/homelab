# Custom Apache configuration

ServerName ${HOMELAB_APP_EXTERNAL_DOMAIN}
DocumentRoot /homelab/www
ServerTokens Prod
TraceEnable off
FileETag None
ServerSignature off
DirectoryIndex disabled
Options -Indexes -ExecCGI -Includes -FollowSymLinks -MultiViews
AcceptPathInfo off
DirectorySlash off
User homelab
Group homelab

# Logging
LogLevel error
ErrorLog /homelab/logs/generic-error.log
CustomLog /homelab/logs/generic-access.log combined
# ForensicLog /homelab/logs/generic-forensic.log

# Remove html response for redirects
# Ideally it would be completely empty, but single char response is the best we can do for now
ErrorDocument 301 "301"
ErrorDocument 302 "302"
ErrorDocument 303 "303"
ErrorDocument 307 "307"
ErrorDocument 308 "308"

# Common TLS Settings
SSLProtocol -all -SSLv3 -TLSv1 -TLSv1.1 -TLSv1.2 +TLSv1.3
# SSLCipherSuite RC4-SHA:AES128-SHA:HIGH:!aNULL:!MD5
SSLCompression off
SSLOptions +StrictRequire
SSLSessionTickets off
# SSLUseStapling on
# SSLStaplingCache "shmcb:logs/ssl_stapling(32768)"

SSLProxyEngine on
SSLProxyVerify none
SSLProxyCheckPeerCN off
SSLProxyCheckPeerName off
SSLProxyCheckPeerExpire off
SetEnv proxy-sendcl 1
SetEnv proxy-sendchunked 0
ProxyStatus on
ProxyPreserveHost on
# ProxyRequests off
# ProxyErrorOverride off

# Setup for mod_status
ExtendedStatus On

<Directory "/homelab/www">
    # Options -Indexes -ExecCGI -Includes -FollowSymLinks -MultiViews +SymLinksIfOwnerMatch
    # AllowOverride None
    AllowOverride All
    Require all granted
</Directory>

<Location "/.apache/">
    DirectoryIndex index.html
</Location>

<Macro CommonProxySettings>
    # Proxy settings
    # ProxyWebsocketFallbackToProxyHttp Off

    # WebSockets #
    # Home Assistant
    # - /api/websocket
    # Jellyfin
    # - /socket
    # MinIO
    # - /ws/objectManager
    # Smpt4dev
    # - /hubs/notifications
    # Tvheadend
    # - /comet/ws
    # UniFi Controller
    # - /wss/s/super/events?clients=v2
    # - /wss/s/default/events?clients=v2&critical_notifications=true
    # Uptime Kuma
    # - /socket.io/?EIO=4&transport=websocket&sid=[REDACTED]
    # Ntfy
    # - /*/ws (* is the topic name)

    # Main proxy config
    AllowEncodedSlashes NoDecode
    ProxyPreserveHost On

    # Forward headers for services that need original request info
    RequestHeader set X-Forwarded-Proto "expr=%{REQUEST_SCHEME}"
    RequestHeader set X-Forwarded-Port "expr=%{SERVER_PORT}"
    RequestHeader set X-Forwarded-Host "expr=%{HTTP_HOST}"

    ProxyPassReverse "/" "${PROXY_UPSTREAM_URL}/"

    # Can't override errors for all services, because it interferes with their own error handling and showing detailed error toasts
    ProxyErrorOverride Off

    ErrorDocument 400 /.apache/errors/400/index.html
    ErrorDocument 401 /.apache/errors/401/index.html
    ErrorDocument 402 /.apache/errors/402/index.html
    ErrorDocument 403 /.apache/errors/403/index.html
    ErrorDocument 404 /.apache/errors/404/index.html
    ErrorDocument 405 /.apache/errors/405/index.html
    ErrorDocument 406 /.apache/errors/406/index.html
    ErrorDocument 407 /.apache/errors/407/index.html
    ErrorDocument 408 /.apache/errors/408/index.html
    ErrorDocument 409 /.apache/errors/409/index.html
    ErrorDocument 410 /.apache/errors/410/index.html
    ErrorDocument 411 /.apache/errors/411/index.html
    ErrorDocument 412 /.apache/errors/412/index.html
    ErrorDocument 413 /.apache/errors/413/index.html
    ErrorDocument 414 /.apache/errors/414/index.html
    ErrorDocument 415 /.apache/errors/415/index.html
    ErrorDocument 416 /.apache/errors/416/index.html
    ErrorDocument 417 /.apache/errors/417/index.html
    # ErrorDocument 418 /.apache/errors/418/index.html # Throws and error
    ErrorDocument 421 /.apache/errors/421/index.html
    ErrorDocument 422 /.apache/errors/422/index.html
    ErrorDocument 423 /.apache/errors/423/index.html
    ErrorDocument 424 /.apache/errors/424/index.html
    # ErrorDocument 425 /.apache/errors/425/index.html # Throws and error
    ErrorDocument 426 /.apache/errors/426/index.html
    ErrorDocument 428 /.apache/errors/428/index.html
    ErrorDocument 429 /.apache/errors/429/index.html
    ErrorDocument 431 /.apache/errors/431/index.html
    ErrorDocument 451 /.apache/errors/451/index.html
    ErrorDocument 500 /.apache/errors/500/index.html
    ErrorDocument 501 /.apache/errors/501/index.html
    ErrorDocument 502 /.apache/errors/502/index.html
    ErrorDocument 503 /.apache/errors/503/index.html
    ErrorDocument 504 /.apache/errors/504/index.html
    ErrorDocument 505 /.apache/errors/505/index.html
    ErrorDocument 506 /.apache/errors/506/index.html
    ErrorDocument 507 /.apache/errors/507/index.html
    ErrorDocument 508 /.apache/errors/508/index.html
    ErrorDocument 510 /.apache/errors/510/index.html
    ErrorDocument 511 /.apache/errors/511/index.html

    Header unset Server
    Header always set Access-Control-Allow-Origin "*"

    # Handle status requests specially behind authentication
    <Location "/.apache/status">
        SetHandler server-status
        # Setup Basic Authentication
        AuthType Basic
        AuthName Protected
        AuthBasicProvider file
        AuthUserFile /homelab/users/proxy-status.htpasswd
        Require valid-user
    </Location>
</Macro>

<VirtualHost *:80>
    ServerAlias *
    Protocols http/1.1

    ErrorLog /homelab/logs/http-error.log
    CustomLog /homelab/logs/http-access.log combined
    # ForensicLog /homelab/logs/http-forensic.log

    # Disable compression for openspeedtest (ensure accurate results)
    SetEnvIfExpr "%{ENV:HOMELAB_APP_TYPE} == 'openspeedtest'" no-gzip=1
</VirtualHost>

<VirtualHost *:443>
    ServerAlias *
    Use CommonProxySettings
    Protocols h2 http/1.1

    ErrorLog /homelab/logs/https-error.log
    CustomLog /homelab/logs/https-access.log combined
    # ForensicLog /homelab/logs/https-forensic.log

    # TLS settings
    SSLEngine on
    SSLCertificateFile /homelab/certs/fullchain.pem
    SSLCertificateKeyFile /homelab/certs/privkey.pem

    # These settings may be required in some upstreams (eg. healthchecks), see more: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Forwarded-Proto
    RequestHeader set HTTP_X_FORWARDED_PROTO https
    RequestHeader set X-Forwarded-Ssl on
    RequestHeader set X-Url-Scheme https

    # Disable compression for openspeedtest (ensure accurate results)
    SetEnvIfExpr "%{ENV:HOMELAB_APP_TYPE} == 'openspeedtest'" no-gzip=1
</VirtualHost>
