<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Error {{ title }} — {{ subtitle }}</title>
    <style>
      :root {
        --bg: #f5f5f5;
        --fg: #111111;
        --muted: #5f5f5f;
        --accent: #6b7280;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f0f10;
          --fg: #e8e8e8;
          --muted: #9a9a9a;
          --accent: #7c7c7c;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        line-height: 1.4;
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 480px;
      }

      @media (max-width: 480px) {
        .container {
          padding: 1rem;
        }
      }

      h1 {
        font-size: 6rem;
        margin: 0;
        letter-spacing: -0.05em;
      }

      h2 {
        font-size: 2rem;
        margin: 0;
        margin-top: -0.3em;
        letter-spacing: -0.01em;
      }

      p {
        margin: 0.5rem 0 1.5rem;
        color: var(--muted);
        font-size: 1rem;
      }

      a {
        display: inline-block;
        padding: 0.6rem 1rem;
        border: 1px solid var(--accent);
        border-radius: 8px;
        color: var(--fg);
        text-decoration: none;
        transition: all 0.2s ease;
        margin: 5px;
      }

      a:hover {
        background: var(--fg);
        color: var(--bg);
      }

      .code {
        font-size: 0.9rem;
        color: var(--muted);
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      {{ content | safe }}
      <p>&nbsp;</p>
      <a href="/">Go home</a>
      <a href="javascript:history.back()">Go back</a>
    </main>
  </body>
</html>
