x-definitions: {}

services:
  app:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: app
    # Override:
    build:
      dockerfile: ./omada-controller/Dockerfile
    networks: # Internet access required for downloading device firmware updates
      internal-network: {}
      external-network: {}
    stop_grace_period: 60s
    tmpfs:
      - /opt/tplink/EAPController/properties:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    volumes:
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/omada/data:/opt/tplink/EAPController/data:rw
      - ${DOCKER_COMPOSE_APP_PATH}/app-logs/omada/default:/opt/tplink/EAPController/logs:rw

  certificator:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: certificator

  apache:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache

  apache-prometheus-exporter:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache-prometheus-exporter

  favicons:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: favicons

