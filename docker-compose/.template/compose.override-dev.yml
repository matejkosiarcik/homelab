x-definitions:
  common-service-options: &common-service-options
    restart: "no"

services:
  app:
    <<: *common-service-options
    # networks: # Uncomment networks when adding ports
    #   - external-network
    #   - internal-network
    # ports:
    # - 127.0.0.1:12345:12345 # Fill in ports as necessary

  certificator:
    <<: *common-service-options

  apache:
    <<: *common-service-options
    networks:
      - external-network
      - internal-network
    ports:
      - 127.0.0.1:8080:80
      - 127.0.0.1:8443:443

  apache-prometheus-exporter:
    <<: *common-service-options

  favicons:
    <<: *common-service-options
