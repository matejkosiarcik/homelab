x-definitions: {}

services:
  app-backend:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: template
    # Override:
    build:
      dockerfile: ./docker-images/groceries/backend/Dockerfile
    container_name: ${DOCKER_COMPOSE_APP_NAME}-app-backend
    depends_on:
      couchdb:
        condition: service_healthy
    env_file:
      - ${DOCKER_COMPOSE_APP_PATH}/app-secrets/app.env
    environment:
      COUCHDB_URL: ${DOCKER_COMPOSE_NETWORK_URL}/couchdb
      GROCERY_API_URL: ${DOCKER_COMPOSE_NETWORK_URL}/api
      GROCERY_URL: ${DOCKER_COMPOSE_NETWORK_URL}
      SMTP_FROM: ${DOCKER_COMPOSE_APP_NAME}@matejhome.com
    image: ${DOCKER_COMPOSE_APP_NAME}-app-backend:1.0.0
    tmpfs:
      - /run:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
      - /var/cache/nginx:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}

  app-frontend:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: template
    # Override:
    build:
      dockerfile: ./docker-images/groceries/frontend/Dockerfile
    container_name: ${DOCKER_COMPOSE_APP_NAME}-app-frontend
    environment:
      DEFAULT_API_URL: ${DOCKER_COMPOSE_NETWORK_URL}/api
    image: ${DOCKER_COMPOSE_APP_NAME}-app-frontend:1.0.0
    tmpfs:
      - /run:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
      - /usr/share/nginx/html:rw,exec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
      - /var/cache/nginx:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}

  couchdb:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: template
    # Override:
    build:
      dockerfile: ./docker-images/couchdb/Dockerfile
    container_name: ${DOCKER_COMPOSE_APP_NAME}-couchdb
    env_file:
      - ${DOCKER_COMPOSE_APP_PATH}/app-secrets/couchdb.env
    image: ${DOCKER_COMPOSE_APP_NAME}-couchdb:1.0.0
    init: false
    tmpfs:
      - /opt/couchdb/etc/local.d:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
    volumes:
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/couchdb/data:/opt/couchdb/data:rw

  certificator:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: certificator

  apache:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache

  apache-prometheus-exporter:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache-prometheus-exporter

  favicons:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: favicons

networks:
  default:
    driver: none
  external-network:
    name: ${DOCKER_COMPOSE_APP_NAME}-external-network
    driver: bridge
    internal: false
  internal-network:
    name: ${DOCKER_COMPOSE_APP_NAME}-internal-network
    driver: bridge
    internal: true
