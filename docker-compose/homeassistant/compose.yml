x-definitions: {}

services:
  app:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: app
    # Override:
    build:
      dockerfile: ./homeassistant/Dockerfile
    # cap_add:
    #   - NET_ADMIN
    #   - NET_RAW
    dns: # Use internal DNS
      - 10.1.12.6
      - 10.1.10.6
    init: false # Can't run with PID other than 1
    networks:
      - external-network
      - internal-network
    # privileged: true
    stop_grace_period: 30s
    tmpfs:
      - /run:rw,exec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/homeassistant/data:/config:rw
      - ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-images/external/homeassistant/configuration.yaml:/config/configuration.yaml:ro

  certificator:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: certificator

  apache:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache

  apache-prometheus-exporter:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache-prometheus-exporter

  favicons:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: favicons

