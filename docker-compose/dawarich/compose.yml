x-definitions: {}

services:
  app:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: app
    build:
      dockerfile: ./external/dawarich/Dockerfile
    volumes:
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/dawarich-public:/var/app/public:rw
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/dawarich-watched:/var/app/tmp/imports/watched:rw
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/dawarich-storage:/var/app/storage:rw
      # - ${DOCKER_COMPOSE_APP_PATH}/app-data/postgis:/dawarich_db_data:rw # TODO: Determine if necessary
    environment:
      MODE: app
    env_file:
      - ${DOCKER_COMPOSE_APP_PATH}/app-secrets/app.env
    tmpfs:
      - /home/homelab/.cache:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
      - /var/app/db:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
      - /var/app/tmp:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}

  sidekiq:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: template
    container_name: ${DOCKER_COMPOSE_APP_NAME}-sidekiq
    image: ${DOCKER_COMPOSE_APP_NAME}-sidekiq:1.0.0
    build:
      dockerfile: ./external/dawarich/Dockerfile
    volumes:
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/dawarich-public:/var/app/public:rw
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/dawarich-watched:/var/app/tmp/imports/watched:rw
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/dawarich-storage:/var/app/storage:rw
    environment:
      MODE: sidekiq
      PROMETHEUS_EXPORTER_HOST: app
    env_file:
      - ${DOCKER_COMPOSE_APP_PATH}/app-secrets/app.env
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f sidekiq"]
      interval: 10s
      retries: 1
      start_period: 60s
      timeout: 5s
    tmpfs:
      # - /root/.cache/gem:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
      - /var/app/db:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
      - /var/app/tmp:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}

  redis:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: redis
    # volumes:
    #   - ${DOCKER_COMPOSE_APP_PATH}/app-data/dawarich-shared:/data:rw # TODO: Determine if necessary

  postgis:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: postgis
    environment:
      POSTGRES_DB: dawarich

  decryptor:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: app
    container_name: ${DOCKER_COMPOSE_APP_NAME}-decryptor
    image: ${DOCKER_COMPOSE_APP_NAME}-decryptor:1.0.0
    build:
      dockerfile: ./custom/owntracks-decryptor/Dockerfile
    env_file:
      - ${DOCKER_COMPOSE_APP_PATH}/app-secrets/decryptor.env

  certificator:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: certificator

  apache:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache
    volumes:
      - ${DOCKER_COMPOSE_APP_PATH}/app-secrets/prometheus.htpasswd:/homelab/users/prometheus.htpasswd:ro

  apache-prometheus-exporter:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache-prometheus-exporter

  favicons:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: favicons

networks:
  default:
    driver: none
  internal-network:
    name: ${DOCKER_COMPOSE_APP_NAME}-internal-network
    driver: bridge
    internal: true
  external-network:
    name: ${DOCKER_COMPOSE_APP_NAME}-external-network
    driver: bridge
    internal: false
