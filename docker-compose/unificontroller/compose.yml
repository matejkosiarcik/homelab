x-definitions: {}

services:
  app:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: app
    # Override:
    build:
      dockerfile: ./unifi-network-application/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_HOST: mongodb
    init: false
    networks: # Internet access required for downloading device firmware updates
      internal-network: {}
      external-network: {}
    stop_grace_period: 30s
    tmpfs:
      - /defaults:rw,noexec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
      - /run:rw,exec,nodev,noatime,nodiratime,uid=${DOCKER_COMPOSE_UID},gid=${DOCKER_COMPOSE_GID}
    volumes:
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/unifi/data:/config:rw
      - ${DOCKER_COMPOSE_APP_PATH}/app-secrets/mongodb-password.txt:/homelab/mongodb-password.txt:ro

  mongodb:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: app
    # Override:
    build:
      dockerfile: ./mongodb/Dockerfile
    container_name: ${DOCKER_COMPOSE_APP_NAME}-mongodb
    env_file:
      - ${DOCKER_COMPOSE_APP_PATH}/app-secrets/mongodb.env
    environment:
      MONGO_AUTHSOURCE: admin
      MONGO_DBNAME: unifi
      MONGO_USER: unifi
    image: ${DOCKER_COMPOSE_APP_NAME}-mongodb:1.0.0
    volumes:
      - ${DOCKER_COMPOSE_APP_PATH}/app-data/mongodb/data:/data/db:rw
      - ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-images/external/unifi-network-application/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro

  certificator:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: certificator

  apache:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache

  apache-prometheus-exporter:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: apache-prometheus-exporter

  favicons:
    extends:
      file: ${DOCKER_COMPOSE_REPOROOT_PATH}/docker-compose/.shared/compose.yml
      service: favicons

